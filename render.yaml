# Render Blueprint — single Web Service (API + React UI)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: hrdc-tp
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_PROVIDER_DISCOVERY
        value: "false"
      - key: ENABLE_COURSE_SCRAPER
        value: "false"
      - key: VITE_ENABLE_PROVIDER_DISCOVERY
        value: "false"
      - key: VITE_ENABLE_COURSE_SCRAPER
        value: "false"
      - key: ALIBABA_API_KEY
        sync: false
      - key: ALIBABA_BASE_URL
        value: https://dashscope-intl.aliyuncs.com
      - key: ALIBABA_MODEL
        value: qwen-plus
